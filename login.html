<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tech Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{ padding:0; margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
  
  /* Body height fixed to 100vh to prevent scrolling */
  html, body { height: 100vh; width: 100%; overflow: hidden; }
  
  body { 
    background: linear-gradient(135deg,#020b14,#052138); 
    color:#eefbff; 
    display: flex; 
    flex-direction: column; 
  }

  /* Compact Navbar */
  nav { 
    background:rgba(0,0,0,0.85); 
    padding:10px 24px; 
    display:flex; 
    justify-content:space-between; 
    align-items:center; 
    flex-shrink: 0; /* Nav size fixed */
  }
  .nav-logo { display:flex; align-items:center; gap:8px; }
  .nav-logo svg { width:32px; height:32px; }
  nav h1 { color:#00f2ff; font-size:1.3rem; margin:0; letter-spacing: 1px; }
  nav ul { display:flex; gap:12px; list-style:none; }
  nav ul li a { color:#fff; text-decoration:none; padding:6px 10px; border-radius:8px; transition:0.2s; font-size: 0.85rem; }
  nav ul li a:hover { background:#00f2ff; color:#01111b; }

  /* Centered Content Area */
  .content { 
    flex: 1; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    padding: 15px;
  }

  /* Compact Login Box */
  .login-box { 
    background:rgba(255,255,255,0.08); 
    backdrop-filter: blur(15px); 
    border:1px solid rgba(0,255,255,0.15); 
    padding: 25px 30px; 
    width: 400px; /* Width adjusted for single line text */
    max-width: 95%; 
    border-radius:18px; 
    box-shadow:0 15px 40px rgba(0,0,0,0.4); 
  }
  
  /* Heading in one line */
  .login-box h2 { 
    color:#00f2ff; 
    margin-bottom:20px; 
    font-size:1.6rem; 
    text-align:center; 
    white-space: nowrap; /* Ensures text stays in one line */
  }

  input { 
    width:100%; 
    padding:12px 14px; 
    margin:8px 0; 
    border:1px solid rgba(255,255,255,0.15); 
    border-radius:10px; 
    background:rgba(255,255,255,0.06); 
    color:#eefbff; 
    outline:none; 
    font-size: 0.9rem;
  }
  input::placeholder { color:#b8e9ff; opacity: 0.7; }

  .password-container { position:relative; }
  .password-container span { 
    position:absolute; 
    right:14px; 
    top:50%; 
    transform:translateY(-50%); 
    cursor:pointer; 
    color:#00f2ff; 
    font-size:1.1rem; 
  }

  button { 
    width:100%; 
    margin-top:15px; 
    border:none; 
    border-radius:10px; 
    padding:12px; 
    background:#00f2ff; 
    color:#02131c; 
    font-size:0.95rem; 
    font-weight:700; 
    cursor:pointer; 
    transition: 0.3s;
  }
  button:hover { background:#d4fcff; transform: translateY(-2px); }

  /* Fixed Bottom Footer */
  footer { 
    background:rgba(0,0,0,0.85); 
    color:#8fbfd1; 
    text-align:center; 
    padding:15px; 
    font-size: 0.85rem;
    flex-shrink: 0;
    border-top: 1px solid rgba(0,255,255,0.1);
  }
</style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f2ff"/>
            <stop offset="100%" stop-color="#7cfffb"/>
          </linearGradient>
        </defs>
        <polygon points="50,12 82,28 82,72 50,88 18,72 18,28" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linejoin="round"/>
        <path d="M34 32 C44 22 60 22 60 32 C60 42 42 42 42 52 C42 62 60 62 60 72" fill="none" stroke="#eef6ff" stroke-width="7" stroke-linecap="round"/>
      </svg>
      <h1>SMART TECH</h1>
    </div>
    <ul>
      <li><a href="login.html">Login</a></li>
      <li><a href="home.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
  </nav>

  <div class="content">
    <div class="login-box">
      <h2>Login to Smart Tech</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <div class="password-container">
          <input type="password" id="password" placeholder="Password" required>
          <span id="toggle">👁️</span>
        </div>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <footer>© 2026 Smart Tech. All rights reserved.</footer>

  <script>
    function togglePassword(){
      const pwd = document.getElementById("password");
      const icon = document.getElementById("toggle");
      if(pwd.type === "password"){ pwd.type = "text"; icon.textContent = "🙈"; }
      else { pwd.type = "password"; icon.textContent = "👁️"; }
    }
    document.getElementById("toggle").addEventListener("click", togglePassword);
    
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      if(username && password){
        window.location.href = "home.html";
      } else {
        alert("Please enter username and password.");
      }
    });
  </script>
</body>
</html>
